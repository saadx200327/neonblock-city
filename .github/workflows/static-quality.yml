name: Static game quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-static-game:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          find . -maxdepth 1 -type f -name '*.js' -print0 \
            | sort -z \
            | xargs -0 -r -n1 node --check

      - name: Validate PWA and static-hosting files
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f manifest.webmanifest
          test -f sw.js
          test -f netlify.toml
          grep -Fq 'manifest.webmanifest' index.html
          grep -Fq 'sw.js' index.html
          grep -Fq '"start_url"' manifest.webmanifest
          grep -Fq '"display"' manifest.webmanifest
          grep -Fq '[build]' netlify.toml

      - name: Validate manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.webmanifest', 'utf8'))"
